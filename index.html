<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hierarchy Dashboard</title>
<link rel="stylesheet" href="/styles.css?v=20260330-ayman-final">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="/dashboard-data.js?v=20260330-ayman-final"></script>
<script defer src="/app.js?v=20260330-ayman-final"></script>
</head>
<body data-view="admin" data-user="admin">
  <div class="shell">
    <header class="hero">
      <div class="hero-copy">
        <span class="eyebrow" id="page-eyebrow">Loading</span>
        <h1 id="page-title">Hierarchy Dashboard</h1>
        <p class="sub" id="page-subtitle">Loading dashboard data...</p>
      </div>

      <nav class="page-nav" id="page-nav" aria-label="Dashboard pages"></nav>

      <div class="path" id="page-path">EST/March-2026/files</div>

      <div class="sync-bar">
        <div class="dot" id="dot"></div>
        <span id="sync-label">Connecting...</span>
      </div>

      <div id="db-warning" class="db-warning is-hidden" role="alert"></div>

      <div id="stats" class="stats"></div>

      <div class="toolbar" aria-label="Status filters">
        <button type="button" class="filter-status" data-status-filter="todo">To Do</button>
        <button type="button" class="filter-status" data-status-filter="wip">In Progress</button>
        <button type="button" class="filter-status" data-status-filter="done">Done</button>
      </div>
    </header>

    <section id="management-root" class="is-hidden"></section>
    <main id="board"></main>
  </div>
</body>
</html>
