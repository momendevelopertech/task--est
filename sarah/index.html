<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarah Dashboard</title>
<link rel="stylesheet" href="/styles.css?v=20260330-task-key-fix">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="/app.js?v=20260330-task-key-fix"></script>
</head>
<body data-page="sarah">
  <div class="shell">
    <header class="hero">
      <div class="hero-copy">
        <span class="eyebrow">Sarah View</span>
        <h1>Sarah Dashboard</h1>
        <p class="sub">Only Sarah's assigned tasks appear on this page, with each floor tracked separately.</p>
      </div>

      <nav class="page-nav" aria-label="Dashboard pages">
        <a class="page-link" href="/">Admin</a>
        <a class="page-link is-active" href="/sarah">Sarah</a>
        <a class="page-link" href="/hossam">Hossam</a>
      </nav>

      <div class="path">est/EST/March-2026/files</div>

      <div class="sync-bar">
        <div class="dot" id="dot"></div>
        <span id="sync-label">Connecting...</span>
      </div>

      <div id="db-warning" class="db-warning is-hidden" role="alert"></div>

      <div id="stats" class="stats"></div>

      <div class="toolbar" aria-label="Status filters">
        <button type="button" class="filter-status" data-status-filter="todo">To Do</button>
        <button type="button" class="filter-status" data-status-filter="wip">In Progress</button>
        <button type="button" class="filter-status" data-status-filter="done">Done</button>
      </div>
    </header>

    <main id="board"></main>
  </div>
</body>
</html>
